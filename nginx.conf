server {
    listen 80;
    root /var/www/html;
    index index.html;

    gzip on;
    gzip_vary on;
    gzip_min_length 256;
    gzip_types text/html text/css application/javascript application/json application/geo+json image/svg+xml;
    gzip_comp_level 6;

    location ~* ^/[^/]+\.(js|css|png)$ {
        gzip_static on;
        expires 7d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }
    location ~* ^/(sprite|maplibre)[^/]*\.json$ {
        gzip_static on;
        expires 7d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    location / {
        try_files $uri $uri/ =404;
    }

    # Aircraft API
    location /data/ {
        proxy_pass http://skylink-core-staging:19180/data/;
    }
    location /re-api/ {
        proxy_pass http://skylink-core-staging:19180/re-api/;
    }

    # Vessel API (also under /data/ for CF compatibility)
    location /api/ {
        proxy_pass http://skylink-core-staging:19180/api/;
    }
    location /data/vessels.json {
        proxy_pass http://skylink-core-staging:19180/api/vessels.json;
    }
    location /data/vessels.geojson {
        proxy_pass http://skylink-core-staging:19180/api/vessels.geojson;
    }
    location /data/vessel {
        proxy_pass http://skylink-core-staging:19180/api/vessel;
    }
    location /data/ais_stats.json {
        proxy_pass http://skylink-core-staging:19180/api/ais_stats.json;
    }
    location /data/path.json {
        proxy_pass http://skylink-core-staging:19180/api/path.json;
    }
    location /data/path.geojson {
        proxy_pass http://skylink-core-staging:19180/api/path.geojson;
    }
    location /data/allpath.geojson {
        proxy_pass http://skylink-core-staging:19180/api/allpath.geojson;
    }
    location /data/stats.json {
        proxy_pass http://skylink-core-staging:19180/stats;
    }

    # MCP
    location /mcp/ {
        proxy_pass http://skylink-core-staging:19180/mcp/;
    }
    location /.well-known/ {
        proxy_pass http://skylink-core-staging:19180/.well-known/;
    }

    # Stats
    location /stats {
        proxy_pass http://skylink-core-staging:19180/stats;
    }

    # WebSocket — aircraft
    location /ws {
        proxy_pass http://skylink-core-staging:19180/ws;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 86400;
    }

    # WebSocket — vessels
    location /ws/ais {
        proxy_pass http://skylink-core-staging:19180/ws/ais;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 86400;
    }

    # WebSocket — unified
    location /ws/unified {
        proxy_pass http://skylink-core-staging:19180/ws/unified;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 86400;
    }
}
